<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Álbum de Figurinhas FIFA 2026</title>
  <meta name="description" content="Gerencie álbuns de figurinhas da Copa do Mundo FIFA 2026 – totalmente gratuito, mobile‑first, sem servidor." />
  
  <!-- Apple/Mobile Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            copaBlue: '#0033A0',   // azul escuro oficial
            copaGreen: '#009639',  // verde floresta oficial
            copaYellow: '#FFC726', // amarelo dourado oficial
            darkBg: '#050814',
            panelBg: 'rgba(13, 20, 41, 0.6)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#02040a] text-gray-100 font-sans min-h-screen flex justify-center items-stretch p-0 sm:p-4">
  
  <!-- Container principal simulando formato de app móvel (Padrão Web App) -->
  <div class="w-full max-w-[480px] bg-[#050814] border-x border-white/5 flex flex-col min-h-screen sm:min-h-[90vh] sm:my-auto sm:rounded-2xl sm:overflow-hidden shadow-2xl relative">
    
    <!-- Header compacto ajustado para Web App -->
    <header class="bg-[#070d1e]/90 border-b border-white/10 backdrop-blur-md sticky top-0 z-50 px-4 py-3">
      <div class="flex flex-col gap-2">
        <!-- Linha superior do Header -->
        <div class="flex justify-between items-center w-full">
          <div class="flex items-center gap-2">
            <div class="bg-gradient-to-r from-copaBlue via-copaGreen to-copaYellow p-[2px] rounded-lg">
              <div class="bg-[#050814] px-2 py-0.5 rounded-[6px] font-black text-[10px] tracking-wider uppercase text-white">
                FIFA 26
              </div>
            </div>
            <h1 class="text-sm font-black tracking-tight text-white">
              Álbum Copa do Mundo
            </h1>
          </div>
          <!-- Seletor de Álbum -->
          <select id="albumSelector" 
                  class="bg-white/5 border border-white/10 text-white text-xs px-2.5 py-1 rounded-lg focus:outline-none focus:border-copaYellow cursor-pointer hover:bg-white/10 transition-colors"
                  onchange="switchAlbum(this.value)">
          </select>
        </div>

        <!-- Links adicionais requeridos (Linha inferior) -->
        <div class="flex items-center justify-between border-t border-white/5 pt-2 text-[10px] text-gray-400 font-semibold">
          <a href="https://www.fifa.com/fifaplus/pt/tournaments/mens/worldcup/canadamexicousa2026" 
             target="_blank" 
             rel="noopener noreferrer" 
             class="hover:text-copaYellow transition-colors flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
            FIFA Plus
          </a>
          <a href="https://panini.com.br" 
             target="_blank" 
             rel="noopener noreferrer" 
             class="hover:text-copaGreen transition-colors flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
            Panini
          </a>
        </div>
      </div>
    </header>

    <!-- Main container do app (Rola de forma independente se exceder a altura) -->
    <main id="appRoot" class="flex-1 p-4 overflow-y-auto w-full"></main>

    <!-- Footer integrado -->
    <footer class="bg-[#050814] border-t border-white/5 py-4 text-center text-[10px] text-gray-500 mt-auto">
      <div class="px-4 flex flex-col items-center gap-3">
        <p>© 2026 - Controle de figurinhas Copa do Mundo.</p>
        
        <!-- Instagram e Produzido por com ícone colorido -->
        <a href="https://instagram.com/freela_ss" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/5">
          <span>Produzido por</span>
          <span class="inline-flex items-center justify-center p-1 rounded-md bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
          </span>
          <strong class="text-white font-bold">@freela_ss</strong>
        </a>
      </div>
    </footer>
    
  </div>

  <script src="app.js" defer></script>
</body>
</html>
