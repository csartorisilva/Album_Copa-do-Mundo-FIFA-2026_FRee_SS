<body class="bg-[#02040a] text-gray-100 font-sans min-h-screen flex justify-center items-stretch p-0 sm:p-4">
  
  <!-- Container principal simulando formato de app móvel (Padrão Web App) -->
  <div class="w-full max-w-[480px] bg-[#050814] border-x border-white/5 flex flex-col min-h-screen sm:min-h-[90vh] sm:my-auto sm:rounded-2xl sm:overflow-hidden shadow-2xl relative">
    
    <!-- Header compacto ajustado para Web App com Ações Rápidas -->
    <header class="bg-[#070d1e]/95 border-b border-white/10 backdrop-blur-md sticky top-0 z-50 px-4 py-3">
      <div class="flex flex-col gap-2.5">

        <div class="flex justify-between items-center w-full">

            <!-- Imagem oficial do Logo da Copa 2026 baseada no anexo -->
            <img src="./logo2026.png" class="h-8 w-auto object-contain filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.4)]" alt="Logo FIFA 2026">
            <!-- Título do Aplicativo -->
            <h1 class="text-xs font-black uppercase leading-none font-sans flex flex-col justify-center">
              <span class="text-copaYellow text-[8px] tracking-widest font-black mb-0.5">Ultimate Cromo</span>
              <span class="text-white text-[11px] font-black tracking-tight">FIFA/Panini 2026</span>
            </h1>
          </div>
          
          <!-- Seletor de Álbum e Perfil -->
          <div class="flex items-center gap-2">
            <select id="albumSelector" class="bg-[#131735] text-white border border-white/10 text-xs px-2 py-1 rounded-lg focus:outline-none focus:border-copaYellow cursor-pointer hover:bg-[#1a1e43] transition-colors" onchange="switchAlbum(this.value)"><option value="alb_1780242093032_jd4r7" class="bg-[#131735] text-white">Meu Álbum Principal</option></select>
            <button id="authHeaderBtn" onclick="handleAuthHeaderClick()" class="w-7 h-7 rounded-full border border-white/10 hover:border-copaYellow/40 bg-white/5 flex items-center justify-center text-xs overflow-hidden transition-all duration-200" title="Minha Conta / Login">👤</button>
          </div>
        </div>

        <!-- Linha inferior do Header: Links à esquerda e Ações Rápidas com ícones à direita -->
        <div class="flex items-center justify-between border-t border-white/5 pt-2 text-[10px] text-gray-400 font-semibold">
          
          <!-- Links externos requeridos -->
          <div class="flex items-center gap-2.5">
            <a href="https://www.fifa.com/fifaplus/pt/tournaments/mens/worldcup/canadamexicousa2026" target="_blank" rel="noopener noreferrer" class="hover:text-copaYellow transition-colors flex items-center gap-0.5">
              FIFA+
            </a>
            <span class="text-white/10">|</span>
            <a href="https://panini.com.br" target="_blank" rel="noopener noreferrer" class="hover:text-copaGreen transition-colors flex items-center gap-0.5">
              Panini
            </a>
            <span class="text-white/10">|</span>
            <a href="https://www.cbf.com.br/selecao-brasileira/noticias/selecao-masculina" target="_blank" rel="noopener noreferrer" class="hover:text-copaYellow transition-colors flex items-center gap-0.5">
              CBF
            </a>
          </div>

          <!-- Ações Rápidas Compactas baseadas em Ícones -->
          <div class="flex items-center gap-2">

            <button onclick="createNewAlbum()" class="flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/5 hover:border-copaYellow/30 w-7 h-7 rounded-lg text-white transition text-xs font-black" title="Iniciar nova coleção do zero">
              +
            </button>

            <!-- 2. Importar Códigos (Seta para baixo azul) -->

                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"></path>
              </svg>
